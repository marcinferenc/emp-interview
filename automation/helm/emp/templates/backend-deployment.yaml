apiVersion: apps/v1
kind: Deployment
metadata:
  name: emp-backend
  namespace: {{ .Values.namespace | quote }}
  labels:
    {{- include "emp.labels" . | nindent 4 }}
    app.kubernetes.io/component: backend
spec:
  replicas: {{ .Values.backend.replicas }}
  selector:
    matchLabels:
      app.kubernetes.io/name: emp-backend
      app.kubernetes.io/instance: {{ .Release.Name }}
  template:
    metadata:
      labels:
        app.kubernetes.io/name: emp-backend
        app.kubernetes.io/instance: {{ .Release.Name }}
        app.kubernetes.io/component: backend
    spec:
      containers:
        - name: emp-backend
          image: "{{ .Values.backend.image.repository }}:{{ .Values.backend.image.tag }}"
          imagePullPolicy: {{ .Values.backend.image.pullPolicy }}
          ports:
            - name: http
              containerPort: {{ .Values.backend.containerPort }}
          env:
            - name: POSTGRES_URL
              value: {{ .Values.backend.env.postgresUrl | quote }}
            - name: POSTGRES_USER
              value: {{ .Values.backend.env.postgresUser | quote }}
            - name: POSTGRES_PASSWORD
              value: {{ .Values.backend.env.postgresPassword | quote }}
